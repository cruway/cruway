name: Generate GitHub Stats

on:
  schedule:
    - cron: "30 18 * * *" # 03:30 JST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clone and start github-readme-stats
        run: |
          git clone --depth 1 https://github.com/anuraghazra/github-readme-stats.git /tmp/stats
          cd /tmp/stats
          npm install
          PAT_1=${{ secrets.PAT_TOKEN }} node express.js &
          sleep 5

      - name: Generate stats SVGs
        run: |
          mkdir -p stats

          # GitHub Stats Card
          curl -s "http://localhost:9000/api?username=cruway&show_icons=true&theme=radical&hide_border=true&bg_color=0D1117&title_color=00FF00&icon_color=00FF00&text_color=FFFFFF&include_all_commits=true&count_private=true" -o stats/github-stats.svg

          # Top Languages
          curl -s "http://localhost:9000/api/top-langs/?username=cruway&layout=compact&theme=radical&hide_border=true&bg_color=0D1117&title_color=00FF00&text_color=FFFFFF&langs_count=10" -o stats/top-langs.svg

      - name: Generate streak stats
        run: |
          curl -s "https://streak-stats.demolab.com/?user=cruway&theme=radical&hide_border=true&background=0D1117&stroke=00FF00&ring=00FF00&fire=FF6600&currStreakLabel=00FF00" -o stats/streak.svg

      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add stats/
          if git commit -m "generated player stats"; then
            git push
          fi
